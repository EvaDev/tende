<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="c">
      <rect x="0" y="0" width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Brown background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="#3D1919"/>

  <!-- Blue strip (clipped to icon corners) -->
  <rect x="0" y="0" width="512" height="108"
        fill="#3B5EA6" clip-path="url(#c)"/>

  <!-- iM monogram -->
  <text x="44" y="365"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="160" font-weight="700" fill="white">iM</text>

  <!-- Chevron 1 -->
  <path d="M254,255 L344,310 L254,365"
        fill="none" stroke="white" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chevron 2 -->
  <path d="M377,255 L467,310 L377,365"
        fill="none" stroke="white" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>